# ─────────────────────────────────────────────────────────────────────────────
# Build Android APK — AL Sistemas
#
# Disparo automático: push em main/master (apenas arquivos do frontend)
# Disparo manual   : Actions → "Build Android APK" → escolha Debug ou Release
#
# Artifacts gerados (aba "Artifacts" de cada run):
#   alsistemas-debug-<sha>   → APK de teste, sem assinatura, 14 dias
#   alsistemas-release-<sha> → APK assinado, produção, 90 dias (requer secrets)
#
# Secrets necessários para o build Release (Settings → Secrets → Actions):
#   KEYSTORE_BASE64     – keystore codificado em base64
#   KEYSTORE_PASSWORD   – senha do keystore
#   KEY_ALIAS           – alias da chave (padrão: alsistemas)
#   KEY_PASSWORD        – senha da chave
#
# Como gerar o base64 do keystore (no terminal):
#   base64 -w 0 release.keystore   (Linux)
#   base64 release.keystore        (macOS)
# ─────────────────────────────────────────────────────────────────────────────

name: 🤖 Build Android APK

on:
  push:
    branches: [main, master]
    paths:
      - 'frontend/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'frontend/**'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Tipo de build'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'
  WORKING_DIR: frontend

jobs:
  # ═══════════════════════════════════════════════════════
  # JOB 1 — APK Debug (sempre, sem secrets)
  # ═══════════════════════════════════════════════════════
  build-debug:
    name: 🔨 Debug APK
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.build_type != 'release' }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: 📱 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json

      - name: 📦 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: 📦 Instalar dependências npm
        run: npm ci
        working-directory: ${{ env.WORKING_DIR }}

      - name: 🏗️ Build Vite (produção)
        run: npm run build
        working-directory: ${{ env.WORKING_DIR }}
        env:
          VITE_API_URL: https://alsistemas.onrender.com/api
          VITE_APP_NAME: AL Sistemas
          VITE_APP_TAGLINE: Painel de Gerenciamento
          VITE_APP_VERSION: ${{ github.ref_name || 'dev' }}

      - name: 🔗 Habilitar URL Vercel no Capacitor
        run: |
          sed -i "s|// url: 'https://alsistemas.vercel.app'|url: 'https://alsistemas.vercel.app'|g" capacitor.config.ts
          echo "capacitor.config.ts atualizado:"
          grep -A3 "server:" capacitor.config.ts
        working-directory: ${{ env.WORKING_DIR }}

      - name: 📱 Adicionar plataforma Android
        run: npx cap add android
        working-directory: ${{ env.WORKING_DIR }}

      - name: 🔄 Sincronizar assets web → Android
        run: npx cap sync android
        working-directory: ${{ env.WORKING_DIR }}

      - name: 🔑 Permissão gradlew
        run: chmod +x gradlew
        working-directory: ${{ env.WORKING_DIR }}/android

      - name: 🔨 Build APK Debug
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        working-directory: ${{ env.WORKING_DIR }}/android

      - name: 📤 Upload APK Debug
        uses: actions/upload-artifact@v4
        with:
          name: alsistemas-debug-${{ github.sha }}
          path: ${{ env.WORKING_DIR }}/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: 📋 Resumo
        if: always()
        run: |
          echo "## 📱 AL Sistemas — APK Debug" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **App ID** | \`com.alsistemas.painel\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Build** | Debug (não assinado) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${GITHUB_SHA::7}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **API** | https://alsistemas.onrender.com/api |" >> $GITHUB_STEP_SUMMARY
          echo "| **WebView** | https://alsistemas.vercel.app |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> ℹ️ O APK debug só pode ser instalado com _USB debugging_ ou via ADB." >> $GITHUB_STEP_SUMMARY
          echo "> Para distribuição, use o workflow Release com keystore configurado." >> $GITHUB_STEP_SUMMARY

  # ═══════════════════════════════════════════════════════
  # JOB 2 — APK Release (manual, requer secrets do keystore)
  # ═══════════════════════════════════════════════════════
  build-release:
    name: 🚀 Release APK (assinado)
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.build_type == 'release' }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: 📱 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json

      - name: 📦 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: 📦 Instalar dependências npm
        run: npm ci
        working-directory: ${{ env.WORKING_DIR }}

      - name: 🏗️ Build Vite (produção)
        run: npm run build
        working-directory: ${{ env.WORKING_DIR }}
        env:
          VITE_API_URL: https://alsistemas.onrender.com/api
          VITE_APP_NAME: AL Sistemas
          VITE_APP_TAGLINE: Painel de Gerenciamento
          VITE_APP_VERSION: ${{ github.ref_name || 'release' }}

      - name: 🔗 Habilitar URL Vercel no Capacitor
        run: |
          sed -i "s|// url: 'https://alsistemas.vercel.app'|url: 'https://alsistemas.vercel.app'|g" capacitor.config.ts
          grep -A3 "server:" capacitor.config.ts
        working-directory: ${{ env.WORKING_DIR }}

      - name: 📱 Adicionar plataforma Android
        run: npx cap add android
        working-directory: ${{ env.WORKING_DIR }}

      - name: 🔄 Sincronizar assets web → Android
        run: npx cap sync android
        working-directory: ${{ env.WORKING_DIR }}

      - name: 🔑 Permissão gradlew
        run: chmod +x gradlew
        working-directory: ${{ env.WORKING_DIR }}/android

      - name: 🔐 Decodificar keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore
          echo "✓ Keystore decodificado: $(stat -c%s app/release.keystore) bytes"
        working-directory: ${{ env.WORKING_DIR }}/android

      - name: 🚀 Build APK Release (assinado)
        run: |
          ./gradlew assembleRelease --no-daemon --stacktrace \
            -Pandroid.injected.signing.store.file="$(pwd)/app/release.keystore" \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"
        working-directory: ${{ env.WORKING_DIR }}/android

      - name: 🔍 Verificar assinatura do APK
        run: |
          APK=$(find . -name "app-release*.apk" | head -1)
          echo "APK: $APK"
          echo "Tamanho: $(du -sh $APK | cut -f1)"
          $ANDROID_SDK_ROOT/build-tools/$(ls $ANDROID_SDK_ROOT/build-tools | tail -1)/apksigner verify --print-certs "$APK"
        working-directory: ${{ env.WORKING_DIR }}/android

      - name: 📤 Upload APK Release
        uses: actions/upload-artifact@v4
        with:
          name: alsistemas-release-${{ github.sha }}
          path: ${{ env.WORKING_DIR }}/android/app/build/outputs/apk/release/app-release*.apk
          retention-days: 90

      - name: 🗑️ Remover keystore da memória
        if: always()
        run: rm -f app/release.keystore
        working-directory: ${{ env.WORKING_DIR }}/android

      - name: 📋 Resumo
        if: always()
        run: |
          echo "## 📱 AL Sistemas — APK Release" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **App ID** | \`com.alsistemas.painel\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Build** | Release (assinado com keystore) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${GITHUB_SHA::7}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **API** | https://alsistemas.onrender.com/api |" >> $GITHUB_STEP_SUMMARY
          echo "| **WebView** | https://alsistemas.vercel.app |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> ✅ APK pronto para distribuição ou envio à Play Store." >> $GITHUB_STEP_SUMMARY
